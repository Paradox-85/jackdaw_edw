name: Mirror selected folders to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push selected folders to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID_MIRROR: ${{ secrets.GIST_ID_MIRROR }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error
          from pathlib import Path

          TOKEN = os.environ['GIST_TOKEN']
          GIST_ID = os.environ['GIST_ID_MIRROR']

          def gh_request(url, data=None, method="GET"):
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"token {TOKEN}")
              req.add_header("Content-Type", "application/json")
              req.add_header("Accept", "application/vnd.github+json")
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode('utf-8')
                  print(f"❌ HTTP {e.code}: {body}")
                  raise

          # Тест с одним простым файлом
          test_files = {
              "test_single_file.py": {"content": "# test content\nprint('hello')"}
          }

          print("🧪 Testing with single file...")
          payload = json.dumps({"files": test_files}).encode("utf-8")
          gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload,
              method="PATCH"
          )
          print("✅ Single file test passed!")

          # Тест с именем содержащим --
          test_files2 = {
              "etl--flows--test.py": {"content": "# test\n"}
          }
          print("🧪 Testing with -- in filename...")
          payload2 = json.dumps({"files": test_files2}).encode("utf-8")
          gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload2,
              method="PATCH"
          )
          print("✅ Filename with -- passed!")
          EOF
