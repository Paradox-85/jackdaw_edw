name: Mirror selected folders to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push selected folders to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID_MIRROR: ${{ secrets.GIST_ID_MIRROR }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error
          from pathlib import Path

          INCLUDE = [
              Path("etl"),
              Path("scripts"),
              Path("ui"),
              Path("sql/schema/schema.sql"),
          ]

          EXCLUDE_SUFFIXES = {
              '.pyc', '.png', '.jpg', '.jpeg', '.gif',
              '.ico', '.xlsx', '.xls', '.db', '.sqlite',
              '.sqlite3', '.pdf', '.zip', '.tar', '.gz'
          }

          MAX_FILE_BYTES = 500_000
          MAX_TOTAL_BYTES = 8_000_000
          TOKEN = os.environ['GIST_TOKEN']
          GIST_ID = os.environ['GIST_ID_MIRROR']

          def gh_request(url, data=None, method="GET"):
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"token {TOKEN}")
              req.add_header("Content-Type", "application/json")
              req.add_header("Accept", "application/vnd.github+json")
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def sanitize_name(path_str):
              parts = path_str.replace("/", "--").split("--")
              parts = [p.lstrip(".") or p for p in parts]
              return "--".join(parts)

          # Шаг 1 — получаем существующие файлы в Gist
          existing = gh_request(f"https://api.github.com/gists/{GIST_ID}")
          existing_files = list(existing.get("files", {}).keys())
          print(f"🗂  Existing files in Gist: {existing_files}")

          # Шаг 2 — собираем новые файлы
          files = {}
          total_size = 0

          for target in INCLUDE:
              paths = [target] if target.is_file() else sorted(target.rglob("*"))
              for path in paths:
                  if not path.is_file():
                      continue
                  if path.suffix in EXCLUDE_SUFFIXES:
                      continue

                  gist_name = sanitize_name(str(path))

                  try:
                      content = path.read_text(encoding="utf-8", errors="ignore")
                  except Exception as e:
                      print(f"⚠️ Skipped {path}: {e}")
                      continue

                  encoded = content.encode("utf-8")
                  if len(encoded) > MAX_FILE_BYTES:
                      content = encoded[:MAX_FILE_BYTES].decode("utf-8", errors="ignore")
                      content += f"\n\n... [TRUNCATED: exceeded {MAX_FILE_BYTES//1000}KB]"
                      print(f"✂️  Truncated: {gist_name}")

                  file_size = len(content.encode("utf-8"))
                  if total_size + file_size > MAX_TOTAL_BYTES:
                      print(f"⛔ Size limit reached, skipping: {gist_name}")
                      continue

                  files[gist_name] = {"content": content or " "}
                  total_size += file_size

          # Шаг 3 — помечаем старые файлы на удаление через null
          for old_name in existing_files:
              if old_name not in files:
                  files[old_name] = None
                  print(f"🗑  Deleting old file: {old_name}")

          print(f"📦 Files to push: {len([f for f in files.values() if f is not None])}")
          print(f"📊 Total size: {total_size / 1024:.1f} KB")

          payload = json.dumps({"files": files}).encode("utf-8")

          result = gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload,
              method="PATCH"
          )
          print(f"✅ Mirror Gist updated: https://gist.github.com/{GIST_ID}")
          EOF
