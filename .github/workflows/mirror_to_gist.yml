name: Mirror selected folders to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push selected folders to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID_MIRROR: ${{ secrets.GIST_ID_MIRROR }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error
          from pathlib import Path

          TOKEN = os.environ['GIST_TOKEN']
          GIST_ID = os.environ['GIST_ID_MIRROR']

          def gh_request(url, data=None, method="GET"):
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"token {TOKEN}")
              req.add_header("Content-Type", "application/json")
              req.add_header("Accept", "application/vnd.github+json")
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode('utf-8')
                  print(f"❌ HTTP {e.code}: {body}")
                  raise

          # Тест 1 — имя с --
          print("🧪 Test 1: filename with --")
          gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=json.dumps({"files": {"etl--flows--test.py": {"content": "# test\n"}}}).encode(),
              method="PATCH"
          )
          print("✅ Test 1 passed")

          # Тест 2 — 5 файлов одновременно
          print("🧪 Test 2: 5 files at once")
          five_files = {f"test--file--{i}.py": {"content": f"# file {i}\n"} for i in range(5)}
          gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=json.dumps({"files": five_files}).encode(),
              method="PATCH"
          )
          print("✅ Test 2 passed")

          # Тест 3 — 45 файлов одновременно
          print("🧪 Test 3: 45 files at once")
          many_files = {f"test--file--{i:02d}.py": {"content": f"# file {i}\n"} for i in range(45)}
          gh_request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=json.dumps({"files": many_files}).encode(),
              method="PATCH"
          )
          print("✅ Test 3 passed")
          EOF
