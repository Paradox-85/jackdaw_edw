name: Export repo to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge all files into one MD
        run: |
          OUTPUT="repo_export.md"
          echo "# Jackdaw EDW — Full Export" > $OUTPUT
          echo "_Generated: $(date -u)_" >> $OUTPUT
          echo "" >> $OUTPUT

          find . -type f \
            ! -name 'repo_export.md' \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '*.pyc' \
            ! -name '*.png' \
            ! -name '*.jpg' \
            ! -name '*.xlsx' \
            | sort | while read file; do
              echo "## \`$file\`" >> $OUTPUT
              echo '```' >> $OUTPUT
              cat "$file" >> $OUTPUT
              echo '```' >> $OUTPUT
              echo "" >> $OUTPUT
            done

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          CONTENT=$(cat repo_export.md | jq -Rs .)
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"repo_export.md\":{\"content\":$CONTENT}}}" \
            "https://api.github.com/gists/$GIST_ID"
          echo "✅ Gist updated: https://gist.github.com/$GIST_ID"
