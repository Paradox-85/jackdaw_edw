name: Export repo to Gist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge all files into one MD
        run: |
          OUTPUT="repo_export.md"
          echo "# Jackdaw EDW — Full Export" > $OUTPUT
          echo "_Generated: $(date -u)_" >> $OUTPUT
          echo "" >> $OUTPUT

          find . -type f \
            ! -name 'repo_export.md' \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '*.pyc' \
            ! -name '*.png' \
            ! -name '*.jpg' \
            ! -name '*.jpeg' \
            ! -name '*.gif' \
            ! -name '*.ico' \
            ! -name '*.xlsx' \
            ! -name '*.xls' \
            ! -name '*.db' \
            ! -name '*.sqlite' \
            ! -name '*.sqlite3' \
            ! -name '*.pdf' \
            ! -name '*.zip' \
            ! -name '*.tar' \
            ! -name '*.gz' \
            | sort | while read file; do
              echo "## \`$file\`" >> $OUTPUT
              echo '```' >> $OUTPUT
              cat "$file" >> $OUTPUT
              echo '```' >> $OUTPUT
              echo "" >> $OUTPUT
            done

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          with open("repo_export.md", "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

          payload = json.dumps({
              "files": {
                  "repo_export.md": {
                      "content": content
                  }
              }
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=payload,
              method="PATCH"
          )
          req.add_header("Authorization", f"token {os.environ['GIST_TOKEN']}")
          req.add_header("Content-Type", "application/json")
          req.add_header("Accept", "application/vnd.github+json")

          with urllib.request.urlopen(req) as resp:
              print(f"✅ Gist updated: https://gist.github.com/{os.environ['GIST_ID']}")
          EOF
