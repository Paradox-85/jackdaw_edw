name: Mirror selected folders to public repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push selected folders to public mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          # Настраиваем git
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Клонируем публичный репозиторий
          git clone https://x-access-token:$MIRROR_TOKEN@github.com/Paradox-85/jackdaw_edw_public.git /tmp/public_repo

          # Очищаем содержимое публичного репо (кроме .git)
          find /tmp/public_repo -mindepth 1 ! -path '/tmp/public_repo/.git/*' -delete

          # Копируем только нужные папки
          for folder in etl scripts ui; do
            if [ -d "$folder" ]; then
              cp -r "$folder" /tmp/public_repo/
            fi
          done

          # Копируем schema.sql отдельно с сохранением пути
          if [ -f "sql/schema/schema.sql" ]; then
            mkdir -p /tmp/public_repo/sql/schema
            cp sql/schema/schema.sql /tmp/public_repo/sql/schema/
          fi

          # Коммитим и пушим
          cd /tmp/public_repo
          git add -A

          if git diff --cached --quiet; then
            echo "✅ No changes to push"
          else
            git commit -m "Mirror update: $(date -u)"
            git push origin main
            echo "✅ Pushed to public mirror"
          fi
