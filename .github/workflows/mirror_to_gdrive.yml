name: Export repo to Google Drive

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge files into one MD
        run: |
          OUTPUT="jackdaw_edw_repository.md"
          echo "# Jackdaw EDW — Full Repository Export" > $OUTPUT
          echo "_Generated: $(date -u)_" >> $OUTPUT
          echo "" >> $OUTPUT

          find . -mindepth 1 -type f \
            ! -name 'jackdaw_edw_repository.md' \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './.claude/*' \
            ! -path './.streamlit/*' \
            ! -path './.vscode/*' \
            ! -path './.superpowers/*' \
            ! -path './docs/*' \
            ! -path './frontend/*' \
            ! -path './prompts/*' \
            ! -name '*.pyc' \
            ! -name '*.png' \
            ! -name '*.jpg' \
            ! -name '*.jpeg' \
            ! -name '*.gif' \
            ! -name '*.ico' \
            ! -name '*.md' \
            ! -name '*.json' \
            ! -name '*.toml' \
            ! -name '*.xlsx' \
            ! -name '*.xls' \
            ! -name '*.db' \
            ! -name '*.sqlite' \
            ! -name '*.sqlite3' \
            ! -name '*.pdf' \
            ! -name '*.zip' \
            ! -name '*.tar' \
            ! -name '*.gz' \
            | sort | while read file; do
              echo "## \`$file\`" >> $OUTPUT
              ext="${file##*.}"
              echo "\`\`\`${ext}" >> $OUTPUT
              cat "$file" >> $OUTPUT
              echo '```' >> $OUTPUT
              echo "" >> $OUTPUT
            done

          echo "✅ Generated $(wc -l < $OUTPUT) lines"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Google Drive
        env:
          RCLONE_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
          RCLONE_GDRIVE_ROOT_FOLDER_ID: ${{ secrets.RCLONE_GDRIVE_ROOT_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          client_id =
          client_secret =
          scope = drive
          root_folder_id = ${RCLONE_GDRIVE_ROOT_FOLDER_ID}
          token = ${RCLONE_GDRIVE_TOKEN}
          EOF

      - name: Upload to Google Drive
        run: |
          rclone copy jackdaw_edw_repository.md "gdrive:LLM/jackdaw_edw" \
            --transfers=4 \
            --checksum \
            --verbose
          echo "✅ Uploaded to gdrive:LLM/jackdaw_edw"
