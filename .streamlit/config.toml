[server]
headless = true
port = 8501
enableCORS = false
# XSRF protection disabled because the app runs behind Caddy reverse proxy
# which handles CSRF at the network layer. Re-enable if proxy config changes.
enableXsrfProtection = false

[theme]
base = "dark"
primaryColor = "#1976D2"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EDF3"
font = "sans serif"

[browser]
gatherUsageStats = false