services:
  # --- INFRASTRUCTURE: DATABASE ---
  # Primary PostgreSQL instance for all services
  postgres:
    image: postgres:16-bookworm
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: d5d182693cfd8f945fcb7fb3653fc039
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/init-db.sql:/docker-entrypoint-initdb.d/10-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- INFRASTRUCTURE: REDIS ---
  # Message broker for Prefect orchestration
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- PREFECT: CORE SERVER ---
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Connection string updated with postgres_admin
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres_admin:d5d182693cfd8f945fcb7fb3653fc039@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_API_URL: https://pve.prefect.adzv-pt.dev/api
    command: >
      bash -c "prefect server database upgrade -y && prefect server start --no-services"
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  # --- PREFECT: BACKGROUND SERVICES ---
  prefect-services:
    image: prefecthq/prefect:3-latest
    container_name: prefect-services
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres_admin:d5d182693cfd8f945fcb7fb3653fc039@postgres:5432/prefect
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_API_URL: https://pve.prefect.adzv-pt.dev/api
    command: prefect server services start

  # --- PREFECT: WORKER ---
  prefect-worker:
    image: prefecthq/prefect:3-latest
    container_name: prefect-worker
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: https://pve.prefect.adzv-pt.dev/api
    command: bash -c "sleep 5 && prefect worker start --pool local-pool"
    restart: on-failure
    volumes:
      - /mnt/shared-data:/mnt/shared-data
    entrypoint: /bin/sh -c "pip install -r /mnt/shared-data/ram-user/Jackdaw/prefect-worker/scripts/requirements.txt && exec prefect worker start --pool 'default-agent-pool'"

  # --- AI COMPUTE: OLLAMA ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
      - /mnt/backup-hdd/sftpgo-data/ram-user/Jackdaw/Master-Data:/data/shared:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- AI COMPUTE: FLOWISE ---
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres_admin
      - DATABASE_PASSWORD=d5d182693cfd8f945fcb7fb3653fc039
      - DATABASE_NAME=flowise_db
      - FLOWISE_USERNAME=flowiseadmin
      - FLOWISE_PASSWORD=E1A3oIDMOcUZGAgEuYXg+9COele24pwL2ck5Hp2Lf1E=
    depends_on:
      postgres:
        condition: service_healthy

  # --- STORAGE: QDRANT ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - /mnt/backup-hdd/sftpgo-data/ram-user/Jackdaw/Master-Data:/data/shared:ro

  # --- STORAGE: NEO4J ---
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/5013d89f19fd063bd0ff1e5442c4dd5c
    volumes:
      - ./neo4j_data:/data

  # --- EDW CONTROL CENTER: STREAMLIT UI ---
  # Build context: edw/ project root. Dockerfile: docker/jackdaw-ui/Dockerfile.
  # External access: https://jackdaw.edw.adzv-pt.dev (via Caddy on VPS)
  jackdaw-ui:
    build:
      context: ../
      dockerfile: docker/jackdaw-ui/Dockerfile
    image: jackdaw-control-center:2.0
    container_name: jackdaw-ui
    restart: unless-stopped
    ports:
      - "10.10.10.50:8501:8501"
    environment:
      DATABASE_URL: "postgresql://postgres_admin:d5d182693cfd8f945fcb7fb3653fc039@postgres:5432/engineering_core"
      DATABASE_VIEWER_URL: "postgresql://edw_viewer:${EDW_VIEWER_PASSWORD:-edw_viewer_change_me}@postgres:5432/engineering_core"
      PREFECT_API_URL: "http://prefect-server:4200/api"
      OLLAMA_URL: "http://ollama:11434"
      EIS_EXPORT_DIR: "/mnt/shared-data/ram-user/Jackdaw/EIS_Exports/"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      LINK_PREFECT: "https://pve.prefect.adzv-pt.dev"
      LINK_DBGATE: "https://pve.db.adzv-pt.dev"
    volumes:
      - /mnt/shared-data:/mnt/shared-data:rw
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy

  # --- DATABASE GUI: DBGATE ---
  dbgate:
    image: dbgate/dbgate:latest
    container_name: dbgate_gui
    restart: always
    ports:
      - "18978:3000"
    volumes:
      - ./dbgate_data:/root/.dbgate
    environment:
      - CONNECTIONS=eng_db
      - LABEL_eng_db=Engineering_Core
      - SERVER_eng_db=postgres
      - PORT_eng_db=5432
      - USER_eng_db=postgres_admin
      - PASSWORD_eng_db=d5d182693cfd8f945fcb7fb3653fc039
      - DATABASE_eng_db=engineering_core
      - ENGINE_eng_db=postgres@dbgate-plugin-postgres
      # AUTH in DbGate
      - LOGINS=admin
      - LOGIN_PASSWORD_admin=Admin-Secure-78!#_db-Logic-2026
      - LOGIN_PERMISSIONS_admin=connections/eng_db,settings/change,widgets/*,dbops/*
      - CONNECTIONS_LOCAL_ONLY=true

volumes:
  postgres_data:
  dbgate_data:
  prefect_data:
  redis_data:
