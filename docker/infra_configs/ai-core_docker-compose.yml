services:
  # --- INFRASTRUCTURE DATABASE ---
  infra-postgres:
    image: postgres:16-bookworm
    container_name: infra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFRA_DB_USER}
      POSTGRES_PASSWORD: ${INFRA_DB_PASS}
      POSTGRES_DB: flowise_db
    volumes:
      - infra_postgres_data:/var/lib/postgresql/data
    networks:
      - ai_core_network

  # --- AI COMPUTE: OLLAMA ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
      - /mnt/backup-hdd/sftpgo-data/ram-user/Jackdaw/Master-Data:/data/shared:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai_core_network

  # --- AI COMPUTE: LLAMA-SERVER (Qwen3.5-27B Dense) ---
  llamacpp-qwen27b:
    image: llamacpp-server:cuda13
    container_name: llamacpp-qwen27b
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - /opt/ai-infra-core/llamacpp_models/qwen35-27b:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/Qwen3.5-27B-UD-Q4_K_XL.gguf
      --alias qwen35-27b
      --host 0.0.0.0
      --port 8081
      --n-gpu-layers 999
      --flash-attn on
      --ctx-size 32768
      --cache-type-k q4_1
      --cache-type-v q4_1
      --batch-size 2048
      --ubatch-size 512
      --parallel 4
      --threads 8
      --threads-batch 8
      --jinja
      --metrics
      --api-key ${LLAMA_API_KEY}
    networks:
      - ai_core_network

  # --- STORAGE: NEO4J ---
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - ./neo4j_data:/data
    networks:
      - ai_core_network

  # --- AI COMPUTE: FLOWISE ---
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=infra-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${INFRA_DB_USER}
      - DATABASE_PASSWORD=${INFRA_DB_PASS}
      - DATABASE_NAME=flowise_db
      - FLOWISE_USERNAME=${FLOWISE_USERNAME}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    depends_on:
      - infra-postgres
    networks:
      - ai_core_network

  # --- STORAGE: QDRANT ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - /mnt/backup-hdd/sftpgo-data/ram-user/Jackdaw/Master-Data:/data/shared:ro
    networks:
      - ai_core_network

  # --- MONITORING: PROMETHEUS ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - ai_core_network

  # --- MONITORING: GRAFANA ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ai_core_network

  # --- MONITORING: NVIDIA DCGM EXPORTER ---
  nvidia-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.6-3.4.2-ubuntu22.04
    container_name: nvidia-exporter
    restart: unless-stopped
    ports:
      - "9400:9400"
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai_core_network

volumes:
  infra_postgres_data:
  ollama_storage:
  qdrant_storage:
  neo4j_data:
  prometheus_data:
  grafana_data:

networks:
  ai_core_network:
    name: ai_core_network # Explicitly naming the network
